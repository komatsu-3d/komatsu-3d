name: MLB Stats Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ここで明示的に書き込みを許可
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 履歴をすべて取得してエラーを防ぐ

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run MLB update script
        run: python update_mlb.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "⚾️ Update MLB stats (Ohtani, Yamamoto & Dodgers)" || echo "No changes to commit"
          git push origin main
