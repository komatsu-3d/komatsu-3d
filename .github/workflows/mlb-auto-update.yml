name: MLB Stats and Bunny Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests
      - name: Run MLB update script
        run: python update_mlb.py

      # --- ここから「垂れ耳うさぎ」の召喚 ---
      - name: Summon Fluffy Lop Bunny
        run: |
          mkdir -p dist
          # 私が生成した特製アニメーション（GIF）をdistフォルダに保存します
          curl -L -o dist/github-bunny.gif https://raw.githubusercontent.com/komatsu-3d/komatsu-3d/main/assets/bunny.gif

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          # うさぎの画像も保存対象にする
          mkdir -p dist
          git add dist/
          git commit -m "⚾️ MLB Stats & 🐰 Bunny Update" || exit 0
          git push
